orms_database:
  name: Spring Data MongoDB
  maven_coordinates: org.springframework.data:spring-data-mongodb
  gradle_dependency: implementation 'org.springframework.data:spring-data-mongodb'
  detection:
    pom_xml_markers:
    - spring-data-mongodb
    - spring-boot-starter-data-mongodb
    import_patterns:
    - import org.springframework.data.mongodb
    - import org.springframework.data.annotation.Id
    code_patterns:
    - '@Document'
    - '@Field'
    - extends MongoRepository
    - MongoTemplate
    - '@MongoId'
  notes: '@Document annotation on class is the MongoDB entity signal. Distinct from
    JPA by package (org.springframework.data.mongodb vs jpa).

    '

