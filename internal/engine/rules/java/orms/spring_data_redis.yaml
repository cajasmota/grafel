orms_database:
  name: Spring Data Redis
  maven_coordinates: org.springframework.data:spring-data-redis
  gradle_dependency: implementation 'org.springframework.data:spring-data-redis'
  detection:
    pom_xml_markers:
    - spring-data-redis
    - spring-boot-starter-data-redis
    import_patterns:
    - import org.springframework.data.redis
    code_patterns:
    - RedisTemplate
    - StringRedisTemplate
    - '@RedisHash'
    - extends CrudRepository
    - RedisConnectionFactory
  notes: 'RedisTemplate is the primary signal. @RedisHash for Redis-backed entities.

    '

