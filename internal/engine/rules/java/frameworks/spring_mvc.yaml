frameworks:
  name: Spring MVC
  category: web_mvc
  maven_coordinates: org.springframework:spring-webmvc
  gradle_dependency: implementation 'org.springframework:spring-webmvc'
  adoption_rank_2025: 2
  detection:
    config_files:
    - WEB-INF/web.xml
    - WEB-INF/dispatcher-servlet.xml
    - '*-servlet.xml'
    pom_xml_markers:
    - spring-webmvc
    - spring-web
    import_patterns:
    - import org.springframework.web.bind.annotation
    - import org.springframework.stereotype.Controller
    - import org.springframework.web.servlet
    code_patterns:
    - '@Controller'
    - '@RequestMapping'
    - '@GetMapping'
    - '@PostMapping'
    - '@RestController'
    - DispatcherServlet
  notes: 'Often used within Spring Boot. @RestController + @RequestMapping is the
    dominant signal. WEB-INF/web.xml indicates legacy non-Boot Spring MVC.

    '

file_conventions: []

# source_patterns: regex patterns that match Spring MVC constructs in source files.
source_patterns:
  # @GetMapping("/path") or @GetMapping(value = "/path") or @GetMapping(path = "/path")
  - pattern: "@GetMapping\\s*\\(\\s*(?:(?:value|path)\\s*=\\s*)?[\"']([^\"'\\n\\r]+)[\"']"
    entity_type: Route
    name_group: 1
    scope: file
  # @PostMapping(...)
  - pattern: "@PostMapping\\s*\\(\\s*(?:(?:value|path)\\s*=\\s*)?[\"']([^\"'\\n\\r]+)[\"']"
    entity_type: Route
    name_group: 1
    scope: file
  # @PutMapping(...)
  - pattern: "@PutMapping\\s*\\(\\s*(?:(?:value|path)\\s*=\\s*)?[\"']([^\"'\\n\\r]+)[\"']"
    entity_type: Route
    name_group: 1
    scope: file
  # @DeleteMapping(...)
  - pattern: "@DeleteMapping\\s*\\(\\s*(?:(?:value|path)\\s*=\\s*)?[\"']([^\"'\\n\\r]+)[\"']"
    entity_type: Route
    name_group: 1
    scope: file
  # @PatchMapping(...)
  - pattern: "@PatchMapping\\s*\\(\\s*(?:(?:value|path)\\s*=\\s*)?[\"']([^\"'\\n\\r]+)[\"']"
    entity_type: Route
    name_group: 1
    scope: file
  # @RequestMapping("/path") or @RequestMapping(value = "/path", method = ...)
  - pattern: "@RequestMapping\\s*\\(\\s*(?:(?:value|path)\\s*=\\s*)?[\"']([^\"'\\n\\r]+)[\"']"
    entity_type: Route
    name_group: 1
    scope: file

# relationship_rules: produce ROUTES_TO edges from each route to its handler method.
# The handler method declaration follows the annotation, so we capture both in
# one match: the URL path on the annotation, then the method name after any
# annotation arguments + modifiers + return type.
relationship_rules:
  # @GetMapping("/path")\n public Foo handler(...) -> ROUTES_TO Controller:handler
  # Uses [^(]*? after the visibility modifier to consume the return type, then
  # captures the final word before '(' as the handler method name.
  - pattern: "@GetMapping\\s*\\([^)]*[\"']([^\"'\\n\\r]+)[\"'][^)]*\\)[^@{};]{0,400}?(?:public|protected|private)\\s[^(){};=]*?(\\w+)\\s*\\("
    source_type: Route
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2
  - pattern: "@PostMapping\\s*\\([^)]*[\"']([^\"'\\n\\r]+)[\"'][^)]*\\)[^@{};]{0,400}?(?:public|protected|private)\\s[^(){};=]*?(\\w+)\\s*\\("
    source_type: Route
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2
  - pattern: "@PutMapping\\s*\\([^)]*[\"']([^\"'\\n\\r]+)[\"'][^)]*\\)[^@{};]{0,400}?(?:public|protected|private)\\s[^(){};=]*?(\\w+)\\s*\\("
    source_type: Route
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2
  - pattern: "@DeleteMapping\\s*\\([^)]*[\"']([^\"'\\n\\r]+)[\"'][^)]*\\)[^@{};]{0,400}?(?:public|protected|private)\\s[^(){};=]*?(\\w+)\\s*\\("
    source_type: Route
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2
  - pattern: "@PatchMapping\\s*\\([^)]*[\"']([^\"'\\n\\r]+)[\"'][^)]*\\)[^@{};]{0,400}?(?:public|protected|private)\\s[^(){};=]*?(\\w+)\\s*\\("
    source_type: Route
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2
  - pattern: "@RequestMapping\\s*\\([^)]*[\"']([^\"'\\n\\r]+)[\"'][^)]*\\)[^@{};]{0,400}?(?:public|protected|private)\\s[^(){};=]*?(\\w+)\\s*\\("
    source_type: Route
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2

