frameworks:
  name: Hibernate / JPA
  category: orm
  maven_coordinates: org.hibernate:hibernate-core
  gradle_dependency: implementation 'org.hibernate:hibernate-core'
  adoption_rank_2025: 1
  detection:
    pom_xml_markers:
    - org.hibernate
    - hibernate-core
    - hibernate-entitymanager
    - javax.persistence
    - jakarta.persistence
    gradle_markers:
    - org.hibernate
    - hibernate-core
    import_patterns:
    - import org.hibernate
    - import javax.persistence
    - import jakarta.persistence
    code_patterns:
    - '@Entity'
    - '@Table'
    - '@OneToMany'
    - '@ManyToOne'
    - 'EntityManagerFactory'
    - 'SessionFactory'
  notes: >
    Hibernate is detected primarily by @Entity and ORM import patterns.
    spring_data_jpa is also gated to this extractor since Spring Data JPA
    wraps Hibernate under the hood.

