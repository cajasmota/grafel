frameworks:
  name: Jakarta EE
  category: enterprise
  maven_coordinates: jakarta.platform:jakarta.jakartaee-api
  gradle_dependency: compileOnly 'jakarta.platform:jakarta.jakartaee-api'
  adoption_rank_2025: 6
  detection:
    config_files:
    - WEB-INF/web.xml
    - WEB-INF/beans.xml
    - META-INF/persistence.xml
    - META-INF/application.xml
    pom_xml_markers:
    - jakarta.jakartaee-api
    - jakarta.platform
    - javax.javaee-api
    import_patterns:
    - import jakarta.
    - import javax.ejb
    - import javax.servlet
    - import javax.ws.rs
    code_patterns:
    - '@Stateless'
    - '@Stateful'
    - '@Singleton'
    - '@MessageDriven'
    - '@WebServlet'
    - '@Path'
    - '@GET'
    - '@POST'
  notes: 'beans.xml presence (even empty) is a high-confidence CDI signal. jakarta.*
    imports indicate EE 9+; javax.* indicates EE 8 or earlier.

    '

