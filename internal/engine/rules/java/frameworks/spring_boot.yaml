frameworks:
  name: Spring Boot
  category: web_full_stack
  maven_coordinates: org.springframework.boot:spring-boot-starter
  gradle_dependency: implementation 'org.springframework.boot:spring-boot-starter'
  bom_artifact: org.springframework.boot:spring-boot-dependencies
  adoption_rank_2025: 1
  detection:
    config_files:
    - application.properties
    - application.yml
    - application-*.properties
    - application-*.yml
    - src/main/resources/application.properties
    - src/main/resources/application.yml
    pom_xml_markers:
    - org.springframework.boot
    - spring-boot-starter-parent
    gradle_markers:
    - org.springframework.boot
    - spring-boot-gradle-plugin
    import_patterns:
    - import org.springframework.boot.SpringApplication
    - import org.springframework.boot.autoconfigure.SpringBootApplication
    code_patterns:
    - '@SpringBootApplication'
    - SpringApplication.run(
  notes: 'spring-boot-starter-parent as parent POM is high-confidence. @SpringBootApplication
    on main class is definitive. application.yml alone is not sufficient.

    '

