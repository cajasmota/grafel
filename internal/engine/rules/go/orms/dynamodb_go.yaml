orms_database:
  name: AWS DynamoDB Go SDK v2
  category: nosql_database
  go_module: github.com/aws/aws-sdk-go-v2/service/dynamodb
  detection:
    import_patterns:
    - github.com/aws/aws-sdk-go-v2/service/dynamodb
    - github.com/aws/aws-sdk-go/service/dynamodb
    code_patterns:
    - dynamodb.NewFromConfig(
    - dynamodb.New(
    - TableName:
  notes: >
    AWS SDK Go v2 (aws-sdk-go-v2) is the recommended client. v1 (aws-sdk-go)
    is also detected via the same framework gate.

