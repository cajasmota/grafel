# Echo HTTP framework extraction rules
# Schema: FrameworkExtractionSchema
# Module: github.com/labstack/echo/v4

file_conventions: []

source_patterns:
  # Route registration: e.GET("/path", handlerFunc)
  - pattern: '\.\s*(?:GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS|Any|CONNECT|TRACE)\s*\(\s*"([^"]+)"\s*,\s*(\w+)'
    entity_type: Route
    name_group: 1
    scope: file

  # Route group: e.Group("/prefix")
  - pattern: '\.Group\s*\(\s*"([^"]+)"\s*\)'
    entity_type: Route
    name_group: 1
    scope: file

  # Middleware registration: e.Use(middlewareFunc)
  - pattern: '\.Use\s*\(\s*(\w[\w.]*)\s*\)'
    entity_type: Middleware
    name_group: 1
    scope: file

  # Handler function: func handlerName(c echo.Context) error
  - pattern: 'func\s+(\w+)\s*\(\s*\w+\s+echo\.Context\s*\)\s*error'
    entity_type: Controller
    name_group: 1
    scope: file

  # echo.New() engine init
  - pattern: 'echo\.New\s*\(\s*\)'
    entity_type: Config
    name_group: 0
    scope: file

relationship_rules:
  # Route CALLS handler: .GET("/path", handlerName) -> handlerName
  - pattern: '\.\s*(?:GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS|Any|CONNECT|TRACE)\s*\(\s*"([^"]+)"\s*,\s*(\w+)'
    source_type: Route
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2

  # Middleware USE: .Use(middlewareName) -> middlewareName
  - pattern: '\.Use\s*\(\s*(\w[\w.]*)\s*(?:,\s*(\w[\w.]*))?\s*\)'
    source_type: Middleware
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2

