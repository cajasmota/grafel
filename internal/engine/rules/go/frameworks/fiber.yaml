# Fiber HTTP framework extraction rules
# Schema: FrameworkExtractionSchema
# Module: github.com/gofiber/fiber/v2 or github.com/gofiber/fiber/v3

file_conventions: []

source_patterns:
  # Route registration: app.Get("/path", handlerFunc)  (Fiber uses Title-case methods)
  - pattern: '\.\s*(?:Get|Post|Put|Patch|Delete|Head|Options|All|Connect|Trace)\s*\(\s*"([^"]+)"\s*,\s*(\w+)'
    entity_type: Route
    name_group: 1
    scope: file

  # Route group: app.Group("/prefix")
  - pattern: '\.Group\s*\(\s*"([^"]+)"\s*\)'
    entity_type: Route
    name_group: 1
    scope: file

  # Middleware registration: app.Use(middlewareFunc)
  - pattern: '\.Use\s*\(\s*(\w[\w.]*)\s*\)'
    entity_type: Middleware
    name_group: 1
    scope: file

  # Handler function: func handlerName(c *fiber.Ctx) error
  - pattern: 'func\s+(\w+)\s*\(\s*\w+\s+\*fiber\.Ctx\s*\)\s*error'
    entity_type: Controller
    name_group: 1
    scope: file

  # fiber.New() app init
  - pattern: 'fiber\.New\s*\(\s*\)'
    entity_type: Config
    name_group: 0
    scope: file

relationship_rules:
  # Route CALLS handler: .Get("/path", handlerName) -> handlerName
  - pattern: '\.\s*(?:Get|Post|Put|Patch|Delete|Head|Options|All|Connect|Trace)\s*\(\s*"([^"]+)"\s*,\s*(\w+)'
    source_type: Route
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2

  # Middleware USE: .Use(middlewareName) -> middlewareName
  - pattern: '\.Use\s*\(\s*(\w[\w.]*)\s*(?:,\s*(\w[\w.]*))?\s*\)'
    source_type: Middleware
    target_type: Controller
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2

# These run after YAML-driven extraction and contribute additional entities +
# relationships to the pipeline result.
