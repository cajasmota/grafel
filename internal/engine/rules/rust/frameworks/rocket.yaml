frameworks:
  name: Rocket
  crate: rocket
  category: web_full
  crates_io_version_2025: 0.5.x
  github_stars_2025: 24500+
  detection:
    cargo_toml_deps:
    - rocket
    import_markers:
    - 'use rocket::'
    - '#[macro_use] extern crate rocket'
    structural_markers:
    - '#[launch]'
    - '#[rocket::main]'
    - '#[get('
    - '#[post('
    - '#[put('
    - '#[delete('
    - rocket::build()
    - rocket::ignite()
    notes: 'Macro-heavy ergonomic framework. Route macros are strong detection signals.
      v0.5 moved to async. Requires nightly for some features in older versions.

      '

