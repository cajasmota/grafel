orms:
  name: MongoDB (mongodb)
  crate: mongodb
  category: nosql
  crates_io_version_2025: 3.x
  detection:
    cargo_toml_deps:
    - mongodb
    - bson
    import_markers:
    - 'use mongodb::'
    - 'use bson::'
    code_patterns:
    - mongodb::Client
    - Client::with_uri_str(
    - mongodb::bson::doc!
    - Collection::<
    - .find_one(
    - .insert_one(
    - .update_one(
    - doc! {
  notes: 'Official MongoDB Rust driver. bson crate is tightly coupled. doc! macro
    is a distinctive code pattern.

    '

