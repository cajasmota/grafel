orms_database:
  name: MySQL R Drivers (RMySQL, RMariaDB)
  category: relational_database
  cran_package: RMySQL
  detection:
    import_patterns:
    - library(RMySQL)
    - library(RMariaDB)
    - require(RMySQL)
    - require(RMariaDB)
    code_patterns:
    - dbConnect(RMySQL::MySQL()
    - dbConnect(RMariaDB::MariaDB()
  notes: >
    RMySQL is the classic CRAN package for MySQL/MariaDB access in R.
    RMariaDB is its modern replacement using the MariaDB Connector/C library.
    Both use DBI's dbConnect() interface.

file_conventions: []
source_patterns: []
relationship_rules: []

