# tRPC framework extraction rules
# Schema: FrameworkExtractionSchema
# NPM: @trpc/server
#
# Top-level detection metadata is consumed by the modular_loader.
# Top-level extraction keys are consumed by FrameworkExtractionSchema.

frameworks:
  name: trpc
  category: rpc
  npm_packages:
  - '@trpc/server'
  - '@trpc/client'
  config_files: []
  detection_signals:
    package_json_deps:
    - '@trpc/server'
    - '@trpc/client'
    import_patterns:
    - from '@trpc/server'
    - require('@trpc/server')
    code_patterns:
    - initTRPC
    - t.router(
    - createTRPCRouter(
    - publicProcedure
    - protectedProcedure
    - createCallerFactory
  framework_specific:
  - initTRPC.context
  - t.middleware
  - t.mergeRouters
  notes: Detect via @trpc/server import; initTRPC.create() call confirms tRPC

# ---------------------------------------------------------------------------
# Extraction schema (FrameworkExtractionSchema —)
# ---------------------------------------------------------------------------

file_conventions:
  # tRPC routers typically live in server/routers/ or src/server/
  - glob: "*/routers/*.ts"
    entity_type: Module
    name_from: filename
  - glob: "*/trpc/*.ts"
    entity_type: Module
    name_from: filename
  - glob: "*/server/routers/*.ts"
    entity_type: Module
    name_from: filename

# client_codegen (#2865): the tRPC client is fully INFERRED from the server's
# AppRouter type — there is no hand-written client, the typed proxy IS the
# generated client. These factories + the inferRouterInputs/Outputs type
# helpers are the definitive codegen signals; capture them as Operation
# entities so "where is the tRPC client generated?" is answerable.
source_patterns:
  - pattern: "createTRPCClient\\s*<"
    entity_type: Operation
    name_group: 0
    scope: file
  - pattern: "createTRPCProxyClient\\s*<"
    entity_type: Operation
    name_group: 0
    scope: file
  - pattern: "createTRPCReact\\s*<"
    entity_type: Operation
    name_group: 0
    scope: file
  - pattern: "createTRPCNext\\s*<"
    entity_type: Operation
    name_group: 0
    scope: file
  - pattern: "(inferRouterInputs|inferRouterOutputs)\\s*<"
    entity_type: Operation
    name_group: 1
    scope: file

relationship_rules: []

