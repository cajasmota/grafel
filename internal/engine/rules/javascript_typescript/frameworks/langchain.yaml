frameworks:
  name: LangChain.js
  npm_package: langchain
  category: ai_framework
  github_stars_2025: 14000+
  gateway: library
  detection:
    config_files: []
    dependency_names:
    - langchain
    - "@langchain/core"
    - "@langchain/community"
    - "@langchain/openai"
    - "@langchain/anthropic"
    import_markers:
    - from "langchain
    - from "@langchain/core
    - from "@langchain/community
    - from "@langchain/openai
    - from "@langchain/anthropic
    - import { } from "langchain
    structural_markers: []
  notes: >
    LangChain TypeScript/JavaScript SDK. Detection via npm dependencies and
    import patterns. No framework-specific config files.

# ---------------------------------------------------------------------------
# Extraction schema (FrameworkExtractionSchema)
# ---------------------------------------------------------------------------

file_conventions: []

source_patterns:
  # --- chain_composition (#2865) -----------------------------------------
  # LCEL .pipe() chain stage. Captures the upstream runnable variable so the
  # chain stage is a queryable Operation (e.g. "prompt" in prompt.pipe(model)).
  - pattern: "(\\w+)\\.pipe\\s*\\("
    entity_type: Operation
    name_group: 1
    scope: file
  # RunnableSequence.from([...]) — the explicit composition constructor.
  - pattern: "RunnableSequence\\.from\\s*\\("
    entity_type: Operation
    name_group: 0
    scope: file
  # --- prompt_template_extraction (#2865) ---------------------------------
  # ChatPromptTemplate.fromMessages(...) / .fromTemplate(...) and the bare
  # PromptTemplate.fromTemplate(...) factory. Captures the template-class +
  # factory call so the prompt is a queryable Schema entity.
  - pattern: "(ChatPromptTemplate|PromptTemplate|FewShotPromptTemplate|SystemMessagePromptTemplate|HumanMessagePromptTemplate)\\.(?:fromTemplate|fromMessages)\\s*\\("
    entity_type: Schema
    name_group: 1
    scope: file
  # new ChatPromptTemplate(...) / new PromptTemplate(...) constructor form.
  - pattern: "new\\s+(ChatPromptTemplate|PromptTemplate|FewShotPromptTemplate)\\s*\\("
    entity_type: Schema
    name_group: 1
    scope: file
  # --- tool_use_detection (#2865) -----------------------------------------
  # DynamicTool / DynamicStructuredTool constructors and the tool() factory
  # (the three idiomatic ways to declare a LangChain tool an agent can call).
  - pattern: "new\\s+(DynamicTool|DynamicStructuredTool)\\s*\\("
    entity_type: Operation
    name_group: 1
    scope: file
  - pattern: "\\btool\\s*\\(\\s*(?:async\\s*)?\\("
    entity_type: Operation
    name_group: 0
    scope: file
  # .bindTools([...]) — attaches a tool set to a model (function-calling).
  - pattern: "\\.bindTools\\s*\\("
    entity_type: Operation
    name_group: 0
    scope: file
  # --- agents -------------------------------------------------------------
  # Agent factory (createReactAgent, createToolCallingAgent, …).
  - pattern: "create\\w+Agent\\s*\\("
    entity_type: Service
    name_group: 0
    scope: file

relationship_rules: []

# custom_extractors: Python callables for patterns YAML rules cannot capture.
custom_extractors:
  - module: archigraph.engine.rules.languages.javascript_typescript.langchain_ts_extractor
    function: extract
    description: >-
      LangChain TS/JS extractor: LCEL .pipe() chains, RunnableSequence.from(),
      agents (createReactAgent + AgentExecutor), DynamicTool/DynamicStructuredTool
      and tool() factory, RAG pipelines (createRetrievalChain, RetrievalQAChain),
      prompts (ChatPromptTemplate, PromptTemplate), memory (BufferMemory,
      ConversationSummaryMemory). Emits DEPENDS_ON (pipe stages), OWNS
      (agent->tools), CALLS (chain invocations).
