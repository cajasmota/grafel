frameworks:
  name: nestjs
  category: web
  npm_packages:
  - '@nestjs/core'
  - '@nestjs/common'
  config_files:
  - nest-cli.json
  - tsconfig.json
  detection_signals:
    package_json_deps:
    - '@nestjs/core'
    - '@nestjs/common'
    decorator_patterns:
    - '@Module'
    - '@Controller'
    - '@Injectable'
    - '@Get'
    - '@Post'
    - '@Put'
    - '@Delete'
  framework_specific:
  - NestFactory.create
  - '@nestjs/testing'
  - NestApplication
  - Guards, Interceptors, Pipes
  notes: nest-cli.json is definitive; @Module decorator confirms NestJS

