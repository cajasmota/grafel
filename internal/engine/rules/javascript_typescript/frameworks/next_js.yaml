frameworks:
  name: next.js
  category: web
  npm_packages:
  - next
  config_files:
  - next.config.js
  - next.config.ts
  - next.config.mjs
  detection_signals:
    package_json_deps:
    - next
    directory_conventions:
    - pages/
    - app/
    - public/
  framework_specific:
  - next/router
  - next/navigation
  - next/image
  - next/link
  - server actions
  - route segments
  notes: Detect App Router via presence of app/layout.tsx or app/page.tsx
