# JavaScript/TypeScript Redis client extraction rules.
#
# Top-level `orms:` key is consumed by the modular_loader (detection).

orms:
  name: ioredis / node-redis
  npm_package: ioredis
  category: cache_client
  github_stars_2025: 15000+
  detection:
    dependency_names:
    - ioredis
    - redis
    - "@upstash/redis"
    import_markers:
    - from 'ioredis'
    - from "ioredis"
    - require('ioredis')
    - require("ioredis")
    - from 'redis'
    - from "@upstash/redis"
    - createClient
    - new Redis(
    - new IORedis(
    structural_markers:
    - createClient(
    - new Redis(
    - new IORedis(
    - new Cluster(
  notes: >
    ioredis and node-redis (createClient) are the dominant Redis clients for
    Node.js. Bull and BullMQ use Redis internally for job queuing.

