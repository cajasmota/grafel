orms_database:
  name: AWS DynamoDB JavaScript/TypeScript SDK v3
  category: nosql_database
  npm_package: "@aws-sdk/client-dynamodb"
  detection:
    import_patterns:
    - from '@aws-sdk/client-dynamodb'
    - from "@aws-sdk/client-dynamodb"
    - from '@aws-sdk/lib-dynamodb'
    - require('aws-sdk')
    code_patterns:
    - new DynamoDBClient(
    - new DynamoDB(
    - DynamoDB.DocumentClient
    - DynamoDBDocumentClient
    - TableName:
  notes: >
    AWS SDK v3 (@aws-sdk/client-dynamodb, @aws-sdk/lib-dynamodb) and v2
    (aws-sdk) are both detected. TypeScript and JavaScript share this extractor.

