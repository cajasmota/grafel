orms_database:
  name: Python SQLite Drivers (sqlite3 / aiosqlite)
  category: sqlite_driver
  pypi_packages:
    - aiosqlite
  stdlib_modules:
    - sqlite3
  detection:
    import_patterns:
      - import sqlite3
      - import aiosqlite
      - from sqlite3
      - from aiosqlite
    code_patterns:
      - sqlite3.connect(
      - aiosqlite.connect(
      - conn.execute(
      - cursor.execute(
      - ":memory:"
  notes: >
    sqlite3 is part of the Python standard library and requires no separate
    install. aiosqlite wraps sqlite3 with async/await support for asyncio
    stacks. In-memory databases are signalled by ":memory:" as the path arg.

file_conventions: []
source_patterns: []
relationship_rules: []

