orms_database:
  name: AWS DynamoDB Python SDK (boto3)
  category: nosql_database
  pypi_package: boto3
  detection:
    import_patterns:
    - import boto3
    - from boto3
    - import aiobotocore
    code_patterns:
    - boto3.resource('dynamodb')
    - boto3.client('dynamodb')
    - .create_table(
    - TableName=
  notes: >
    boto3 is the primary DynamoDB client for Python. aiobotocore provides
    async support. This extractor gates on dynamodb as the framework identifier.

