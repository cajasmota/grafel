orms_database:
  name: Cassandra Python Driver (DataStax)
  category: nosql_database
  pip_package: cassandra-driver
  detection:
    import_patterns:
    - from cassandra.cluster import Cluster
    - import cassandra
    - from cassandra.cqlengine
    code_patterns:
    - Cluster()
    - cluster.connect()
    - 'models.Model'
  notes: >
    DataStax Python Driver (cassandra-driver) including cqlengine ORM.
    The scylla-driver fork is Cassandra-compatible and uses identical APIs.

file_conventions: []
source_patterns: []
relationship_rules: []

