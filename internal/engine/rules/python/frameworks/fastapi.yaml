# FastAPI framework extraction rules.
#
# Top-level `frameworks:` key is consumed by the modular_loader (detection).
# Top-level extraction keys (file_conventions, source_patterns,
# relationship_rules) are consumed by FrameworkExtractionSchema.
#
frameworks:
  name: FastAPI
  pypi_package: fastapi
  category: web_async_api
  github_stars_2025: 96600+
  gateway: asgi
  detection:
    config_files:
    - main.py
    - app.py
    - '*/routers/*.py'
    dependency_names:
    - fastapi
    import_markers:
    - from fastapi import FastAPI
    - FastAPI()
    - APIRouter()
    structural_markers:
    - routers/ directory
  notes: >
    Typically co-detected with uvicorn and pydantic. Routers pattern (APIRouter)
    is high-confidence for FastAPI vs Starlette.

# ---------------------------------------------------------------------------
# Extraction schema (FrameworkExtractionSchema —)
# ---------------------------------------------------------------------------

# file_conventions: glob -> entity_type mapping from file naming conventions.
file_conventions:
  - glob: "*/routers/*.py"
    entity_type: Route
    name_from: filename
  - glob: "*/dependencies/*.py"
    entity_type: Service
    name_from: filename
  - glob: "*/schemas/*.py"
    entity_type: Model
    name_from: filename
  - glob: "*/models/*.py"
    entity_type: Model
    name_from: filename
  - glob: "*/middleware/*.py"
    entity_type: Middleware
    name_from: filename

# source_patterns: regex patterns that match framework constructs in source.
# name_group references the capture group that provides the entity name.
source_patterns:
  # Route decorators: @app.get("/path") or @router.get("/path")
  - pattern: "@(?:app|router)\\.(get|post|put|patch|delete|head|options|trace)\\(\\s*[\"']([^\"']+)[\"']"
    entity_type: Route
    name_group: 2
    scope: file
  # APIRouter instantiation: router = APIRouter(prefix="/items")
  - pattern: "(\\w+)\\s*=\\s*APIRouter\\s*\\("
    entity_type: Route
    name_group: 1
    scope: file
  # FastAPI app instantiation: app = FastAPI(...)
  - pattern: "(\\w+)\\s*=\\s*FastAPI\\s*\\("
    entity_type: Service
    name_group: 1
    scope: file
  # Dependency injection via Depends: def func(dep: SomeType = Depends(...))
  - pattern: "def\\s+(\\w+)\\s*\\([^)]*Depends\\s*\\("
    entity_type: Dependency
    name_group: 1
    scope: function
  # Pydantic model definitions used as request/response schemas
  - pattern: "class\\s+(\\w+)\\s*\\(\\s*(?:BaseModel|pydantic\\.BaseModel)\\s*\\)"
    entity_type: Model
    name_group: 1
    scope: class
  # Middleware via @app.middleware("http")
  - pattern: "@(?:app|router)\\.middleware\\s*\\(\\s*[\"'](\\w+)[\"']"
    entity_type: Middleware
    name_group: 1
    scope: file

# relationship_rules: regex patterns that produce edges between entities.
# source_group / target_group reference capture groups for entity names.
relationship_rules:
  # Route includes dependency injection: route -> service IMPORTS
  - pattern: "def\\s+(\\w+)\\s*\\([^)]*=\\s*Depends\\(\\s*(\\w+)\\s*\\)"
    source_type: Route
    target_type: Service
    relationship: IMPORTS
    source_group: 1
    target_group: 2
  # Dependency injected into route handler: Dependency INJECTED_INTO Route
  - pattern: "def\\s+(\\w+)\\s*\\([^)]*=\\s*Depends\\(\\s*(\\w+)\\s*\\)"
    source_type: Dependency
    target_type: Route
    relationship: INJECTED_INTO
    source_group: 2
    target_group: 1
  # Router registered on app: app.include_router(router, ...)
  - pattern: "(\\w+)\\.include_router\\s*\\(\\s*(\\w+)"
    source_type: Service
    target_type: Route
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2
  # Handler decorated by route decorator (single-line match)
  - pattern: "@(?:app|router)\\.(?:get|post|put|patch|delete)\\([^)]*\\)\\s*\\ndef\\s+(\\w+)"
    source_type: Route
    target_type: Service
    relationship: DECORATES
    source_group: 1
    target_group: 1

# These run after YAML-driven extraction and contribute additional entities +
# relationships to the pipeline result.
