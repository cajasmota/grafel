orms_database:
  name: postgres (Dart PostgreSQL Driver)
  category: postgres_driver
  pub_package: postgres
  detection:
    import_patterns:
      - package:postgres/postgres.dart
      - import 'package:postgres/
    code_patterns:
      - PostgreSQLConnection(
      - Connection(
      - await connection.open()
  notes: >
    The postgres package (pub.dev) is the primary PostgreSQL driver for Dart.
