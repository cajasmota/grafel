orms_database:
  name: AWS DynamoDB Kotlin SDK (aws.sdk.kotlin:dynamodb)
  category: nosql_database
  gradle_dependency: implementation("aws.sdk.kotlin:dynamodb")
  detection:
    import_patterns:
    - import aws.sdk.kotlin.services.dynamodb
    code_patterns:
    - DynamoDbClient.builder()
    - DynamoDbEnhancedClient.builder()
    - '@DynamoDbBean'
  notes: >
    The AWS SDK for Kotlin (aws.sdk.kotlin:dynamodb) is the official Kotlin
    client. DynamoDB Enhanced Client annotations are also supported.

file_conventions: []
source_patterns: []
relationship_rules: []

