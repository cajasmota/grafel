orms_database:
  name: PostgreSQL Kotlin Drivers (Exposed, R2DBC)
  category: postgres_driver
  maven_coordinates:
    - org.jetbrains.exposed:exposed-jdbc
    - org.jetbrains.exposed:exposed-core
    - io.r2dbc:r2dbc-postgresql
  detection:
    import_patterns:
      - org.jetbrains.exposed
      - io.r2dbc.postgresql
      - Database.connect(
    code_patterns:
      - Database.connect(
      - R2dbcDatabase.create(
      - TransactionManager.manager
  notes: >
    JetBrains Exposed is the idiomatic Kotlin ORM/DSL for PostgreSQL (and
    other databases). R2DBC provides reactive non-blocking access.

file_conventions: []
source_patterns: []
relationship_rules: []

