framework:
  name: Amazonica / cognitect-labs aws-api (DynamoDB)
  category: nosql_database
  clojars_package: amazonica
  detection:
    import_patterns:
    - amazonica.aws.dynamodbv2
    - cognitect.aws.dynamodb
    code_patterns:
    - far/create-table
    - amazonica/create-table
    - aws/invoke
  notes: >
    Amazonica provides a Clojure wrapper around the AWS Java SDK.
    cognitect-labs/aws-api is the alternative pure-Clojure approach.

