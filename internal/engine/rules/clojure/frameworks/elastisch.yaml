frameworks:
  name: elastisch
  lein_coordinates: clojurewerkz/elastisch
  detection:
    project_clj_markers:
    - clojurewerkz/elastisch
    import_patterns:
    - clojurewerkz.elastisch
    - clojurewerkz/elastisch
    code_patterns:
    - esr/connect
    - es/connect
    - elastisch/connect
  notes: |
    elastisch (clojurewerkz/elastisch) is the primary Clojure Elasticsearch client.
    Uses (esr/connect "http://...") pattern.
