orms_database:
  name: Monger / CongoMongo (Clojure MongoDB)
  lein_dep: com.novemberain/monger
  category: nosql_driver
  detection:
    lein_deps:
      - com.novemberain/monger
      - congomongo
    import_markers:
      - monger.core
      - somnium.congomongo
    code_patterns:
      - mg/connect
      - mc/connect
      - mc/aggregate

