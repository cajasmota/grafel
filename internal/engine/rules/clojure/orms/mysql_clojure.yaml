orms_database:
  name: MySQL Clojure Drivers (next.jdbc, clojure.java.jdbc)
  category: relational_database
  deps_edn: com.github.seancorfield/next.jdbc
  detection:
    import_patterns:
    - next.jdbc
    - clojure.java.jdbc
    code_patterns:
    - :subprotocol "mysql"
    - :subprotocol 'mysql'
    - jdbc:mysql://
  notes: >
    Clojure MySQL access uses next.jdbc (modern) or clojure.java.jdbc (legacy)
    with MySQL Connector/J as the underlying JDBC driver. Detection relies on
    the :subprotocol "mysql" map key or jdbc:mysql:// URL.

file_conventions: []
source_patterns: []
relationship_rules: []

