frameworks:
  name: Ecto SQLite3 / exqlite (Elixir)
  category: sqlite_driver
  hex_packages:
    - ecto_sqlite3
    - exqlite
  detection:
    mix_deps:
      - ecto_sqlite3
      - exqlite
    code_patterns:
      - Ecto.Adapters.SQLite3
      - Exqlite.Connection.connect(
      - Exqlite.Basic.open(
      - adapter: Ecto.Adapters.SQLite3
  notes: >
    ecto_sqlite3 is an Ecto adapter backed by exqlite. Used for lightweight
    Elixir apps that do not need PostgreSQL. exqlite provides the raw SQLite3
    NIF bindings. Configured via config :myapp, MyApp.Repo, adapter: Ecto.Adapters.SQLite3.

