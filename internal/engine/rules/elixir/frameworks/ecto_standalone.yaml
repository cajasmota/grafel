frameworks:
  name: Ecto (standalone)
  hex_package: ecto
  category: database_layer
  github_stars_2025: 6000+
  detection:
    config_files:
    - mix.exs
    - lib/app/repo.ex
    - priv/repo/migrations/
    mix_deps:
    - ecto
    - ecto_sql
    - postgrex
    - myxql
    - sqlite_ecto2
    - ecto_sqlite3
    import_markers:
    - use Ecto.Repo
    - use Ecto.Schema
    - use Ecto.Migration
    - import Ecto.Query
    - import Ecto.Changeset
    - schema "
    - 'field :'
    - 'belongs_to :'
    - 'has_many :'
    - 'has_one :'
    - 'many_to_many :'
    - Repo.insert
    - Repo.all
    - Repo.get
    structural_markers:
    - lib/app/repo.ex
    - lib/app/schemas/
    - priv/repo/migrations/
  notes: 'Ecto is the canonical Elixir database wrapper and query library. lib/app/repo.ex
    (use Ecto.Repo) is high-confidence. priv/repo/migrations/ directory with timestamped
    migration files is definitive. Listed both here and in section 4 (ORMs/DB) as
    it is the primary DB layer.

    '
