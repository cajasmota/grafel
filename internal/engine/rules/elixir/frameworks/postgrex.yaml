orms_database:
  name: Postgrex (Elixir PostgreSQL Driver)
  category: postgres_driver
  hex_package: postgrex
  detection:
    import_patterns:
      - Postgrex
      - Ecto.Adapters.Postgres
    code_patterns:
      - Postgrex.start_link(
      - Repo.start_link(
      - adapter: Ecto.Adapters.Postgres
  notes: >
    Postgrex is the PostgreSQL driver for Elixir. Ecto uses Postgrex under
    the hood via Ecto.Adapters.Postgres. Postgrex supports LISTEN/NOTIFY
    natively via Postgrex.Notifications.

file_conventions: []
source_patterns: []
relationship_rules: []

