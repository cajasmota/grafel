frameworks:
  name: MyXQL (MySQL Adapter for Elixir / Ecto)
  category: relational_database
  hex_package: myxql
  detection:
    import_patterns:
    - MyXQL
    - Ecto.Adapters.MyXQL
    code_patterns:
    - MyXQL.start_link(
    - adapter: MyXQL
    - Ecto.Adapters.MyXQL
  notes: >
    MyXQL is the official MySQL adapter for Elixir's Ecto ORM. It implements
    the Ecto.Adapters.SQL behaviour and connects to MySQL/MariaDB servers.

file_conventions: []
source_patterns: []
relationship_rules: []

