orms_database:
  name: MySQL Scala Drivers (MySQL Connector/J via JDBC, Slick MySQL profile)
  category: relational_database
  maven_coordinates: com.mysql:mysql-connector-j
  detection:
    import_patterns:
    - com.mysql.cj.jdbc
    - slick.jdbc.MySQLProfile
    code_patterns:
    - Database.forURL("jdbc:mysql:
    - DriverManager.getConnection("jdbc:mysql:
    - MySQLProfile.api
  notes: >
    Scala MySQL access uses MySQL Connector/J via JDBC (Database.forURL with
    jdbc:mysql://) or through Slick's MySQLProfile. Both are detected.

file_conventions: []
source_patterns: []
relationship_rules: []

