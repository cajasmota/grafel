orms_database:
  name: Scala SQLite (slick-sqlite / sqlite-jdbc via JDBC)
  category: sqlite_driver
  sbt_dependencies:
    - org.xerial:sqlite-jdbc
    - com.typesafe.slick:slick-hikaricp
  detection:
    import_patterns:
      - import slick.jdbc.SQLiteProfile
      - import org.sqlite
    code_patterns:
      - Database.forURL("jdbc:sqlite:
      - Database.forDriver(
      - '"jdbc:sqlite:'
      - ":memory:"
  notes: >
    Scala uses sqlite-jdbc (Xerial) as the JDBC driver. Slick uses
    SQLiteProfile for type-safe queries. Doobie can also target SQLite via
    JDBC. In tests, in-memory databases (:memory:) are standard.

file_conventions: []
source_patterns: []
relationship_rules: []

