orms_database:
  name: Scanamo (guardian/scanamo)
  category: nosql_database
  sbt_dependency: '"org.scanamo" %% "scanamo" % "x.y.z"'
  detection:
    import_patterns:
    - import org.scanamo
    - import software.amazon.awssdk.services.dynamodb
    code_patterns:
    - Scanamo(
    - ScanamoCats(
    - ScanamoAlpakka(
    - Scanamo.exec(
  notes: >
    Scanamo is the idiomatic Scala DynamoDB library. ScanamoCats provides
    cats-effect integration, ScanamoAlpakka for Akka Streams.

file_conventions: []
source_patterns: []
relationship_rules: []

