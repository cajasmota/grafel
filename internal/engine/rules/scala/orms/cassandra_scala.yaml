orms_database:
  name: phantom / quill-cassandra (Scala Cassandra Drivers)
  category: nosql_database
  sbt_dependency: '"com.outworkers" %% "phantom-dsl" % "2.x.x"'
  detection:
    import_patterns:
    - com.outworkers.phantom
    - io.getquill
    - com.datastax.driver.core
    code_patterns:
    - extends Table
    - extends CassandraTable
    - quill-cassandra
    - Cluster.builder
  notes: >
    Covers phantom (outworkers/phantom) and quill-cassandra (getquill/quill).
    Both use the DataStax Java Driver underneath.

file_conventions: []
source_patterns: []
relationship_rules: []

