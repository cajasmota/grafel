orms_database:
  name: mongodb/mongodb (PHP driver)
  composer_package: mongodb/mongodb
  category: nosql_driver
  detection:
    composer_deps:
      - mongodb/mongodb
      - ext-mongodb
    import_markers:
      - use MongoDB\Client
      - use MongoDB\Collection
      - MongoDB\BSON
    code_patterns:
      - 'new MongoDB\Client('
      - 'new \MongoDB\Client('
      - ->aggregate(
      - ->watch(

