orms_database:
  name: AWS DynamoDB PHP SDK (aws/aws-sdk-php)
  category: nosql_database
  composer_package: aws/aws-sdk-php
  detection:
    import_patterns:
    - use Aws\DynamoDb\DynamoDbClient
    - use Aws\\DynamoDb\\DynamoDbClient
    code_patterns:
    - DynamoDbClient
    - 'DynamoDbClient::factory'
  notes: >
    The aws/aws-sdk-php package provides Aws\DynamoDb\DynamoDbClient as the
    primary entry point for DynamoDB operations in PHP.

file_conventions: []
source_patterns: []
relationship_rules: []

