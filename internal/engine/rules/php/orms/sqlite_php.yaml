  notes: >
    PHP provides two built-in SQLite interfaces: PDO with the sqlite driver
    (new PDO("sqlite:/path/db.sqlite")) and the SQLite3 class (new SQLite3("file.db")).
    Both are included in standard PHP builds. PDO is preferred for
    cross-database portability.

