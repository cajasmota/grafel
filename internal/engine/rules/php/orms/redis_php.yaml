# PHP Redis client extraction rules.
#
# Top-level `orms:` key is consumed by the modular_loader (detection).

orms:
  name: phpredis / Predis
  category: cache_client
  detection:
    dependency_names:
    - predis/predis
    - ext-redis
    import_markers:
    - new Redis()
    - new \Redis()
    - new Predis\Client
    - new \Predis\Client
    structural_markers:
    - new Redis()
    - Predis\Client(
    - $redis->connect(
    - $redis->get(
  notes: >
    phpredis (ext-redis) is a C extension; Predis is pure PHP. Both are widely
    used in Laravel/Symfony applications. Detection signals overlap since both
    expose similar API surfaces.

