frameworks:
  name: Laravel
  package_name: laravel/framework
  category: web_full_stack
  github_stars_2025: 79000+
  detection:
    config_files:
    - composer.json
    - composer.lock
    - artisan
    - bootstrap/app.php
    - config/app.php
    - config/database.php
    - config/cache.php
    - config/queue.php
    - routes/web.php
    - routes/api.php
    - app/Http/Kernel.php
    - app/Providers/AppServiceProvider.php
    - database/migrations/
    - resources/views/
    - storage/framework/
    - .env.example
    composer_deps:
    - laravel/framework
    - laravel/sanctum
    - laravel/passport
    - laravel/horizon
    - laravel/telescope
    - laravel/jetstream
    - laravel/breeze
    - laravel/octane
    - laravel/pennant
    - laravel/reverb
    import_markers:
    - use Illuminate\
    - use App\
    - extends Controller
    - extends Model
    - Illuminate\Support\ServiceProvider
    - Illuminate\Foundation\Application
    structural_markers:
    - app/Http/Controllers/
    - app/Models/
    - app/Providers/
    - database/migrations/
    - resources/views/
    - routes/web.php
    - artisan
  notes: 'artisan file at project root is the highest-confidence single signal. Conjunction
    of artisan + composer.json laravel/framework dep is definitive. routes/web.php
    alone is insufficient — always check artisan + app/Http/.

    '
