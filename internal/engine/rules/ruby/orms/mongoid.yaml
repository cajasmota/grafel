orms:
  name: Mongoid
  gem_name: mongoid
  category: document_orm
  detection:
    gemfile_deps:
    - mongoid
    - mongoid-versioning
    config_files:
    - config/mongoid.yml
    - app/models/**/*.rb
    code_patterns:
    - include Mongoid::Document
    - include Mongoid::Timestamps
    - 'field :name, type: String'
    - embedded_in :parent
    - embeds_many :children
    - belongs_to :user
    - 'index({ email: 1 })'
  notes: 'MongoDB ODM for Ruby/Rails. config/mongoid.yml is high-confidence. Mongoid::Document
    include replaces ActiveRecord::Base inheritance. embedded_in / embeds_many are
    Mongoid-specific — not in ActiveRecord.

    '

