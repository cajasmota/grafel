orms_database:
  name: AWS DynamoDB Ruby SDK (aws-sdk-dynamodb)
  category: nosql_database
  gem_name: aws-sdk-dynamodb
  detection:
    import_patterns:
    - require 'aws-sdk-dynamodb'
    - require "aws-sdk-dynamodb"
    code_patterns:
    - Aws::DynamoDB::Client.new
    - Aws::DynamoDB::Resource.new
  notes: >
    The aws-sdk-dynamodb gem is the primary DynamoDB client for Ruby.

