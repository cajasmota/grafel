orms_database:
  name: pg Ruby gem (PostgreSQL Ruby Driver)
  category: postgres_driver
  gem_name: pg
  detection:
    import_patterns:
      - require 'pg'
      - require "pg"
    code_patterns:
      - PG.connect(
      - PG::Connection.new(
      - PG::Connection.open(
  notes: >
    The pg gem is the standard PostgreSQL adapter for Ruby. It provides a
    low-level interface to libpq. Used directly or via ActiveRecord's
    postgresql adapter.

file_conventions: []
source_patterns: []
relationship_rules: []

