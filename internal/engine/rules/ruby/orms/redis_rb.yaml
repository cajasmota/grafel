# Ruby Redis client extraction rules.
#
# Top-level `orms:` key is consumed by the modular_loader (detection).

orms:
  name: redis-rb
  gem: redis
  category: cache_client
  github_stars_2025: 4000+
  detection:
    dependency_names:
    - redis
    - redis-client
    gemfile_markers:
    - gem 'redis'
    - gem "redis"
    import_markers:
    - require 'redis'
    - require "redis"
    structural_markers:
    - Redis.new(
    - Redis.current
    - Sidekiq.configure_redis
  notes: >
    redis-rb is the official Ruby Redis client. Sidekiq uses Redis as its queue
    backend. The Redis.current thread-safe accessor is common in Rails apps.

