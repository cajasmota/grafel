orms_database:
  name: DBD::Pg (Perl DBI PostgreSQL Driver)
  category: postgres_driver
  cpan_module: DBD::Pg
  detection:
    import_patterns:
      - use DBD::Pg
      - use DBI
    code_patterns:
      - DBI->connect("dbi:Pg:
      - DBD::Pg->connect(
  notes: >
    DBD::Pg is the DBI driver for PostgreSQL in Perl. Used with the standard
    Perl DBI interface for database-independent access. Supports
    large objects, COPY, and LISTEN/NOTIFY via PostgreSQL-specific methods.

