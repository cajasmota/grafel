orms_database:
  name: MySQL Perl Driver (DBD::mysql / DBI)
  category: relational_database
  cpan_module: DBD::mysql
  detection:
    import_patterns:
    - use DBI
    - use DBD::mysql
    code_patterns:
    - DBI->connect("dbi:mysql:
    - DBI->connect('dbi:mysql:
    - DBD::mysql
  notes: >
    DBD::mysql is the DBI driver for MySQL in Perl. Connections are created
    via DBI->connect("dbi:mysql:database=name;host=..."). The DBI module
    provides the standard Perl database interface.

file_conventions: []
source_patterns: []
relationship_rules: []

