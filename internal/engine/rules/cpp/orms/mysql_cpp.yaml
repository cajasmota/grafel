orms_database:
  name: MySQL Connector/C++ (libmysqlclient)
  category: relational_database
  detection:
    import_patterns:
    - '#include <mysql.h>'
    - '#include <mysql/mysql.h>'
    - '#include <cppconn/driver.h>'
    - '#include <jdbc/mysql_driver.h>'
    code_patterns:
    - mysql_real_connect(
    - get_mysql_driver_instance()
    - sql::Driver* driver
    - mysql_init(
  notes: >
    MySQL Connector/C++ provides both the legacy C API (libmysqlclient,
    mysql_real_connect) and a JDBC-style C++ API (sql::Driver,
    get_mysql_driver_instance). Both are detected.

file_conventions: []
source_patterns: []
relationship_rules: []

