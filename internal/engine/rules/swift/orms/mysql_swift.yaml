orms_database:
  name: MySQL Swift Driver (mysql-nio / vapor/mysql-kit)
  category: relational_database
  spm_package: https://github.com/vapor/mysql-kit
  detection:
    import_patterns:
    - import MySQLNIO
    - import MySQLKit
    - import FluentMySQLDriver
    code_patterns:
    - MySQLConnection.connect(
    - MySQLNIOConnection.connect(
    - app.databases.use(.mysql(
  notes: >
    mysql-nio provides low-level non-blocking MySQL access for Swift/Vapor.
    mysql-kit (MySQLKit) wraps mysql-nio with a higher-level API.
    FluentMySQLDriver is the Fluent ORM MySQL adapter.

