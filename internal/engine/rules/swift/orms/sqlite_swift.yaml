orms:
  name: SQLite.swift
  category: sqlite_driver
  spm_coordinates:
    - stephencelis/SQLite.swift
  cocoapods:
    - pod 'SQLite.swift'
  detection:
    import_patterns:
      - import SQLite
    code_patterns:
      - Connection(
      - try Connection(
      - Table(
      - Expression<
      - db.run(
  notes: >
    SQLite.swift provides a type-safe, Swift-idiomatic API for SQLite.
    The Connection type is the primary database handle. Detected by
    import SQLite and Connection(...) construction. Commonly used in
    iOS/macOS apps that want SQL control without an ORM.

