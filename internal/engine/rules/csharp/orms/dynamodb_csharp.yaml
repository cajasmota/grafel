orms_database:
  name: AWS DynamoDB .NET SDK (AWSSDK.DynamoDBv2)
  category: nosql_database
  nuget_package: AWSSDK.DynamoDBv2
  detection:
    import_patterns:
    - using Amazon.DynamoDBv2
    - using Amazon.DynamoDBv2.Model
    - using Amazon.DynamoDBv2.DataModel
    code_patterns:
    - AmazonDynamoDBClient
    - DynamoDBContext
    - AmazonDynamoDB
  notes: >
    AWSSDK.DynamoDBv2 covers both the low-level AmazonDynamoDBClient and the
    higher-level DynamoDBContext (object persistence model).

file_conventions: []
source_patterns: []
relationship_rules: []

