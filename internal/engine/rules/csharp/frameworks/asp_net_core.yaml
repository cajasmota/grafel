# ASP.NET Core Minimal API framework extraction rules
# Schema: FrameworkExtractionSchema
# NuGet: Microsoft.AspNetCore.App (built-in to SDK)
#
# Top-level `frameworks:` key is consumed by the modular_loader (detection).
# Top-level extraction keys are consumed by FrameworkExtractionSchema.
#
# Note: Handler shape inference is MEDIUM confidence (shape_inferred_partially).
# Route path extraction from MapGet/MapPost/etc. is HIGH confidence.

frameworks:
  name: ASP.NET Core
  category: web_full_stack
  nuget_package: Microsoft.AspNetCore.App
  sdk_attribute: Microsoft.NET.Sdk.Web
  adoption_rank_2025: 1
  detection:
    csproj_sdk:
    - Sdk="Microsoft.NET.Sdk.Web"
    csproj_package_references:
    - Microsoft.AspNetCore.App
    - Microsoft.AspNetCore.Mvc
    - Microsoft.AspNetCore.Routing
    config_files:
    - appsettings.json
    - appsettings.Development.json
    - appsettings.Production.json
    - launchSettings.json
    - Program.cs
    - Startup.cs
    code_patterns:
    - WebApplication.CreateBuilder(
    - app.MapGet(
    - app.MapPost(
    - app.UseRouting()
    - app.UseEndpoints(
    - builder.Services.AddControllers()
    - IApplicationBuilder
    notes: >
      Sdk="Microsoft.NET.Sdk.Web" in .csproj is the highest-confidence signal.
      Program.cs with WebApplication.CreateBuilder is Minimal APIs (ASP.NET Core 6+).
      Startup.cs pattern is pre-6.0 style. appsettings.json alone is insufficient.

# ---------------------------------------------------------------------------
# Extraction schema (FrameworkExtractionSchema —)
# ---------------------------------------------------------------------------

file_conventions:
  # Endpoint definition modules in Endpoints/ directory
  - glob: "*/Endpoints/*.cs"
    entity_type: Operation
    name_from: class_name
  # Service layer files
  - glob: "*/Services/*.cs"
    entity_type: Service
    name_from: class_name
  # Model/DTO files
  - glob: "*/Models/*.cs"
    entity_type: Model
    name_from: class_name
  # Middleware files
  - glob: "*/Middleware/*.cs"
    entity_type: Middleware
    name_from: class_name

source_patterns:
  # Minimal API route registration — app.MapGet/MapPost/MapPut/MapDelete/MapPatch
  # Matches: app.MapGet("/orders", ...) or app.MapGet("/orders/{id}", ...)
  # Route path extraction: HIGH confidence
  - pattern: "app\\.Map(?:Get|Post|Put|Delete|Patch)\\s*\\(\\s*\"([^\"]+)\""
    entity_type: Operation
    name_group: 1
    scope: file

  # MapGroup("/prefix") — route group prefix
  # Matches: var group = app.MapGroup("/api/v1")
  - pattern: "\\.MapGroup\\s*\\(\\s*\"([^\"]+)\""
    entity_type: Route
    name_group: 1
    scope: file

  # Inline lambda handler: (Type param) => { ... }
  # Captures the parameter type as a dependency (MEDIUM confidence — shape_inferred_partially)
  - pattern: "Map(?:Get|Post|Put|Delete|Patch)\\s*\\([^,]+,\\s*(?:async\\s+)?\\(([^)]+)\\)"
    entity_type: Dependency
    name_group: 1
    scope: file

  # WebApplication.CreateBuilder(...) entry point
  - pattern: "WebApplication\\.CreateBuilder\\s*\\("
    entity_type: Config
    name_group: 0
    scope: file

  # builder.Services.AddXxx(...) — DI service registration
  # Matches: builder.Services.AddSingleton<IOrderService, OrderService>()
  - pattern: "builder\\.Services\\.Add(?:Singleton|Scoped|Transient)\\s*<\\s*([\\w,\\s<>]+)\\s*>"
    entity_type: Service
    name_group: 1
    scope: file

  # app.UseXxx() — middleware pipeline registration
  # Matches: app.UseAuthentication() or app.UseAuthorization()
  - pattern: "app\\.Use(\\w+)\\s*\\("
    entity_type: Middleware
    name_group: 1
    scope: file

  # IEndpointRouteBuilder extension method MapXxx — for endpoint grouping classes
  # Matches: public static void MapOrderEndpoints(this IEndpointRouteBuilder app)
  - pattern: "(?:public|internal)\\s+static\\s+\\S+\\s+(Map\\w+)\\s*\\(\\s*this\\s+IEndpointRouteBuilder"
    entity_type: Operation
    name_group: 1
    scope: function

  # Record/class as request/response DTO
  # Matches: public record CreateOrderRequest(...) or public class OrderResponse
  - pattern: "(?:public|internal)\\s+(?:record|class)\\s+(\\w+(?:Request|Response|Dto|Command|Query))\\b"
    entity_type: Model
    name_group: 1
    scope: class

relationship_rules:
  # app.MapGroup("/prefix") contains app.MapGet("/path") — nested routing
  # Connects route group prefix to individual endpoint registrations
  - pattern: "\\.MapGroup\\s*\\(\\s*\"([^\"]+)\"[^;]*;[\\s\\S]{0,400}?\\.Map(?:Get|Post|Put|Delete|Patch)\\s*\\(\\s*\"([^\"]+)\""
    source_type: Route
    target_type: Operation
    relationship: ROUTES_TO
    source_group: 1
    target_group: 2

  # builder.Services.Add<IService, Impl>() registers service — DI wiring
  # Connects the implementation to the interface it is registered as
  - pattern: "builder\\.Services\\.Add(?:Singleton|Scoped|Transient)\\s*<\\s*([\\w]+)\\s*,\\s*([\\w]+)\\s*>"
    source_type: Service
    target_type: Service
    relationship: IMPLEMENTS
    source_group: 2
    target_group: 1

