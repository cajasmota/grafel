frameworks:
  name: Entity Framework Core
  category: orm
  nuget_package: Microsoft.EntityFrameworkCore
  adoption_rank_2025: 1
  detection:
    csproj_package_references:
    - Microsoft.EntityFrameworkCore
    - Microsoft.EntityFrameworkCore.SqlServer
    - Microsoft.EntityFrameworkCore.Sqlite
    - Microsoft.EntityFrameworkCore.InMemory
    - Microsoft.EntityFrameworkCore.Npgsql
    - Npgsql.EntityFrameworkCore.PostgreSQL
    - Pomelo.EntityFrameworkCore.MySql
    config_files:
    - Migrations/*.cs
    - Data/ApplicationDbContext.cs
    - '*DbContext.cs'
    code_patterns:
    - ': DbContext'
    - DbSet<
    - OnModelCreating(
    - '[Key]'
    - '[Required]'
    - '[ForeignKey('
    - modelBuilder.Entity<
    - .HasOne(
    - .HasMany(
    - dotnet ef migrations
    notes: 'EF Core is the dominant .NET ORM. DbContext subclass with DbSet<T> properties
      is definitive. Migrations/ directory confirms EF Core usage. Provider package
      (SqlServer, Npgsql, Pomelo) reveals target database.

      '


