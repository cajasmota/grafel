swagger: "2.0"
info:
  title: Swagger2 Petstore
  version: "1.0.0"
parameters:
  Limit:
    name: limit
    in: query
    type: integer
  Offset:
    name: offset
    in: query
    type: integer
paths:
  /pets:
    get:
      summary: List pets
      tags:
        - pets
      parameters:
        - $ref: '#/parameters/Limit'
        - $ref: '#/parameters/Offset'
      responses:
        '200':
          description: ok
          schema:
            $ref: '#/definitions/PetList'
    post:
      summary: Create pet
      tags: [pets, write]
      parameters:
        - in: body
          name: body
          schema:
            $ref: '#/definitions/Pet'
      responses:
        '201':
          description: created
          schema:
            $ref: '#/definitions/Pet'
definitions:
  Pet:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      owner:
        $ref: '#/definitions/Owner'
  Owner:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
  PetList:
    type: array
    items:
      $ref: '#/definitions/Pet'
