  <text x="293" y="645" font-size="9" fill="#EF4444" text-anchor="middle">404</text>

  <rect x="816" y="572" width="604" height="80" rx="8" fill="#0C1118" stroke="#1E2733" stroke-width="1"/>
  <rect x="836" y="590" width="46" height="20" rx="10" fill="#1B1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="859" y="604" font-size="10" font-weight="700" fill="#F59E0B" text-anchor="middle">PUT</text>
  <rect x="888" y="590" width="54" height="20" rx="10" fill="#1A1030" stroke="#8B5CF6" stroke-width="1"/>
  <text x="915" y="604" font-size="10" font-weight="700" fill="#8B5CF6" text-anchor="middle">PATCH</text>
  <text x="952" y="604" font-size="13" font-weight="500" fill="#E2E8F0" class="mono">BuildingViewSet.update</text>
  <text x="836" y="626" font-size="12" fill="#64748B">core/viewsets/building_viewset.py</text>
  <text x="1030" y="626" font-size="12" fill="#22C55E">:L78</text>

  <!-- EMPTY STATES PANEL - showing 3 states for frontend agent reference -->
  <rect x="220" y="668" width="380" height="160" rx="8" fill="#0C1118" stroke="#1E2733" stroke-width="1"/>
  <text x="240" y="690" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.04em">EMPTY STATE — Zero search results</text>
