  <text x="256" y="410" font-size="11" fill="#64748B" class="mono">Method:</text>
  <rect x="340" y="397" width="46" height="18" rx="9" fill="#1B1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="363" y="410" font-size="10" font-weight="700" fill="#F59E0B" text-anchor="middle">PUT</text>

