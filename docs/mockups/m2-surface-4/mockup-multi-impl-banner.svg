  <!-- Banner text -->
  <text x="290" y="200" font-size="13" font-weight="600" fill="#E2E8F0">Multi-client implementation divergence detected</text>
  <text x="290" y="220" font-size="12" fill="#94A3B8">This path is called by <tspan font-weight="600" fill="#D97706">2 frontend implementations</tspan> with different HTTP verbs and payload shapes.</text>
  <text x="290" y="238" font-size="12" fill="#64748B">ACME Web uses PUT · ACME Mobile uses PATCH — partial update vs full replace semantics may differ.</text>

