  <text x="340" y="434" font-size="11" fill="#94A3B8" class="mono">{ name, address, type, owner_id, ... }</text>
  <text x="256" y="452" font-size="10" fill="#475569" class="mono">(full object, 18 fields)</text>

  <text x="256" y="476" font-size="11" fill="#64748B" class="mono">Status codes:</text>
  <text x="356" y="476" font-size="11" fill="#94A3B8" class="mono">200, 400, 404</text>

  <text x="256" y="498" font-size="11" fill="#64748B" class="mono">Frequency:</text>
  <text x="340" y="498" font-size="11" fill="#94A3B8" class="mono">called from 4 store files</text>

  <text x="256" y="520" font-size="10" fill="#D97706" class="mono">⚠ Full replace — missing fields reset to null</text>

  <!-- Right: ACME Mobile -->
  <rect x="830" y="364" width="540" height="172" rx="6" fill="#080D14" stroke="#1E2733" stroke-width="1"/>
  <rect x="830" y="364" width="540" height="28" rx="6" fill="#0D1530"/>
  <rect x="830" y="378" width="540" height="14" fill="#0D1530"/>
  <text x="846" y="382" font-size="11" font-weight="600" fill="#818CF8">ACME Mobile (React Native)</text>
  <text x="1310" y="382" font-size="10" fill="#475569" text-anchor="end">src/services/buildings.api.ts:L22</text>

  <text x="846" y="410" font-size="11" fill="#64748B" class="mono">Method:</text>
  <rect x="930" y="397" width="54" height="18" rx="9" fill="#1A1030" stroke="#8B5CF6" stroke-width="1"/>
  <text x="957" y="410" font-size="10" font-weight="700" fill="#8B5CF6" text-anchor="middle">PATCH</text>

  <text x="846" y="434" font-size="11" fill="#64748B" class="mono">Sends body:</text>
  <text x="930" y="434" font-size="11" fill="#94A3B8" class="mono">{ name, address }</text>
  <text x="846" y="452" font-size="10" fill="#475569" class="mono">(partial, 2 fields only)</text>

  <text x="846" y="476" font-size="11" fill="#64748B" class="mono">Status codes:</text>
  <text x="946" y="476" font-size="11" fill="#94A3B8" class="mono">200, 400, 404</text>

  <text x="846" y="498" font-size="11" fill="#64748B" class="mono">Frequency:</text>
  <text x="930" y="498" font-size="11" fill="#94A3B8" class="mono">1 service file</text>

  <text x="846" y="520" font-size="10" fill="#22C55E" class="mono">✓ Partial update — safe for mobile edit flows</text>

