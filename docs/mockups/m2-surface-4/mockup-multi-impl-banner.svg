  <rect x="640" y="706" width="280" height="14" rx="7" fill="#141920"/>
  <rect x="640" y="728" width="200" height="14" rx="7" fill="#141920"/>
  <rect x="648" y="750" width="160" height="12" rx="6" fill="#1E2733"/>
  <rect x="640" y="770" width="240" height="14" rx="7" fill="#141920"/>
  <rect x="640" y="792" width="180" height="14" rx="7" fill="#141920"/>
  <text x="640" y="820" font-size="11" fill="#475569">Shimmer: 1.5s loop, opacity 0.4→0.7→0.4, ease-in-out</text>

  <rect x="1020" y="668" width="400" height="160" rx="8" fill="#0C1118" stroke="#1E2733" stroke-width="1"/>
  <text x="1040" y="690" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.04em">ERROR STATE — Backend unreachable</text>
  <rect x="1040" y="710" width="360" height="70" rx="6" fill="#180A0A" stroke="#EF4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="1060" y="735" font-size="13" fill="#EF4444">⚠ Failed to load paths</text>
  <text x="1060" y="754" font-size="11" fill="#94A3B8">Could not reach /api/paths/{group}</text>
  <text x="1060" y="772" font-size="11" fill="#64748B">Check archigraph server status.</text>
  <rect x="1060" y="790" width="80" height="24" rx="6" fill="#1E0808" stroke="#EF4444" stroke-width="1"/>
  <text x="1100" y="806" font-size="11" fill="#EF4444" text-anchor="middle">Retry</text>
  <text x="1040" y="820" font-size="10" fill="#475569">Auto-retry: 3x with 2s backoff, then show error</text>

  <!-- Annotation -->
  <rect x="220" y="840" width="1200" height="30" rx="4" fill="#1A1208" stroke="#D97706" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="235" y="860" font-size="11" fill="#D97706">[ANIM] Banner: slide-down 250ms ease-out when fetches_count > 1. Comparison expand: accordion open 300ms ease-out. Multi-impl badge pulse: 2s loop amber glow on first load only. Reduced-motion: no animation, show static.</text>

