  <rect x="620" y="668" width="380" height="160" rx="8" fill="#0C1118" stroke="#1E2733" stroke-width="1"/>
  <text x="640" y="690" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.04em">LOADING STATE — Skeleton rows</text>
