  <text x="380" y="150" font-size="11" fill="#334155"> · </text>
  <text x="390" y="150" font-size="11" fill="#475569">Last updated 2026-05-18</text>
  <rect x="534" y="140" width="60" height="18" rx="9" fill="#0D2020" stroke="#22C55E" stroke-width="1"/>
  <text x="564" y="153" font-size="9" fill="#22C55E" text-anchor="middle">acme-api</text>

