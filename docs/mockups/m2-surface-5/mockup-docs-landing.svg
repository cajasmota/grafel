  <!-- Lead paragraph -->
  <text x="308" y="186" font-size="14" fill="#94A3B8" font-style="normal">
    <tspan x="308" dy="0">archigraph is a static analysis engine that extracts the dependency graph of your codebase</tspan>
  </text>
  <text x="308" y="206" font-size="14" fill="#94A3B8">and exposes it over a REST API, MCP protocol, and this web dashboard. This document</text>
  <text x="308" y="226" font-size="14" fill="#94A3B8">explains the high-level architecture and how the major components interact.</text>

  <!-- H2: Core Components -->
  <text x="308" y="266" font-size="20" font-weight="700" fill="#E2E8F0" letter-spacing="-0.3px">Core Components</text>
  <rect x="308" y="274" width="820" height="1" fill="#1E2733"/>

  <!-- Body text paragraphs with backtick inline code symbols (EntityLink elements) -->
  <text x="308" y="298" font-size="14" fill="#94A3B8">The engine has three primary subsystems: the</text>
  <!-- EntityLink: backticked symbol — hover shows hovercard [ANIM 150ms tooltip] -->
  <rect x="540" y="284" width="90" height="20" rx="4" fill="#141920" stroke="#1E2733" stroke-width="1"/>
  <text x="585" y="299" font-size="13" fill="#22C55E" text-anchor="middle" class="mono">Extractor</text>
  <text x="634" y="298" font-size="14" fill="#94A3B8">, the</text>
  <rect x="658" y="284" width="72" height="20" rx="4" fill="#141920" stroke="#1E2733" stroke-width="1"/>
  <text x="694" y="299" font-size="13" fill="#22C55E" text-anchor="middle" class="mono">Indexer</text>
  <text x="734" y="298" font-size="14" fill="#94A3B8">, and the</text>
  <rect x="806" y="284" width="72" height="20" rx="4" fill="#141920" stroke="#1E2733" stroke-width="1"/>
  <text x="842" y="299" font-size="13" fill="#22C55E" text-anchor="middle" class="mono">GraphDB</text>

  <text x="308" y="322" font-size="14" fill="#94A3B8">layer. Each component owns a single responsibility and communicates via typed contracts.</text>

  <!-- H3: The Extractor -->
  <text x="308" y="358" font-size="16" font-weight="600" fill="#CBD5E1" letter-spacing="-0.2px">The Extractor</text>

  <text x="308" y="382" font-size="14" fill="#94A3B8">Language-specific parsers walk ASTs and emit raw entities + relationships. The</text>
  <rect x="776" y="368" width="88" height="20" rx="4" fill="#141920" stroke="#1E2733" stroke-width="1"/>
  <text x="820" y="383" font-size="13" fill="#22C55E" text-anchor="middle" class="mono">PyExtractor</text>
  <text x="308" y="402" font-size="14" fill="#94A3B8">handles Python source trees, while</text>
  <rect x="534" y="388" width="86" height="20" rx="4" fill="#141920" stroke="#1E2733" stroke-width="1"/>
  <text x="577" y="403" font-size="13" fill="#22C55E" text-anchor="middle" class="mono">JSExtractor</text>
  <text x="624" y="402" font-size="14" fill="#94A3B8">targets JS/TS repos.</text>

  <!-- Callout block: pattern reference example -->
  <rect x="308" y="420" width="820" height="56" rx="6" fill="#0D2020" stroke="#22C55E" stroke-width="1"/>
  <rect x="308" y="420" width="4" height="56" rx="2" fill="#22C55E"/>
  <text x="326" y="440" font-size="10" font-weight="600" fill="#22C55E" letter-spacing="0.06em">PATTERN</text>
  <text x="326" y="458" font-size="12" fill="#94A3B8" font-style="italic">tenant-prefix-route: All multi-tenant API routes must carry a</text>
  <text x="326" y="474" font-size="12" fill="#94A3B8" font-style="italic">
    <tspan class="mono" fill="#22C55E" font-style="normal">{tenant_id}</tspan>
    <tspan> prefix parameter. 12 exemplars found.</tspan>
  </text>

