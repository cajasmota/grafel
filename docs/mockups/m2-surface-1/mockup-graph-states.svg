<?xml version="1.0" encoding="UTF-8"?>
<!-- Surface 1 — Graph Viewer: States (Loading, Empty, Error) + 2D Fallback -->
<svg width="1440" height="960" viewBox="0 0 1440 960" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'SF Pro Display', system-ui, sans-serif">
  <defs>
    <style>
      text { font-family: 'Inter', 'SF Pro Display', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; }
    </style>
    <linearGradient id="shimmerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E2733" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#2D3748" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1E2733" stop-opacity="0.4"/>
    </linearGradient>
    <!-- 2D node glows -->
    <radialGradient id="node2DCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node2DGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node2DPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ==================== MASTER BACKGROUND ==================== -->
  <rect width="1440" height="960" fill="#0E1117"/>

  <!-- Frame labels (design annotations) -->
  <!-- Frame 1: Loading -->
  <text x="30" y="34" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.08em">LOADING STATE</text>
  <!-- Frame 2: Empty -->
  <text x="490" y="34" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.08em">EMPTY STATE</text>
  <!-- Frame 3: Error -->
  <text x="950" y="34" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.08em">ERROR STATE</text>
  <!-- Frame 4: 2D Fallback label -->
  <text x="30" y="514" font-size="11" font-weight="600" fill="#475569" letter-spacing="0.08em">2D FALLBACK MODE</text>

  <!-- Dividers between frames -->
  <rect x="460" y="0" width="1" height="480" fill="#1E2733"/>
  <rect x="920" y="0" width="1" height="480" fill="#1E2733"/>
  <rect x="0" y="480" width="1440" height="1" fill="#1E2733"/>

  <!-- ============================
       FRAME 1: LOADING STATE
       ============================ -->
  <rect x="0" y="44" width="460" height="436" fill="#070A14"/>

  <!-- Top nav skeleton -->
  <rect x="0" y="44" width="460" height="36" fill="#141920" stroke="#1E2733" stroke-width="1"/>
  <rect x="12" y="54" width="80" height="14" rx="3" fill="url(#shimmerGrad)"/>
  <rect x="110" y="54" width="40" height="14" rx="3" fill="url(#shimmerGrad)"/>
  <rect x="158" y="54" width="40" height="14" rx="3" fill="url(#shimmerGrad)"/>
  <rect x="206" y="54" width="40" height="14" rx="3" fill="url(#shimmerGrad)"/>
  <rect x="370" y="54" width="76" height="14" rx="7" fill="url(#shimmerGrad)"/>

  <!-- Sidebar skeleton -->
  <rect x="0" y="80" width="140" height="400" fill="#0C1118" stroke="#1E2733" stroke-width="1"/>
  <rect x="12" y="96" width="80" height="10" rx="3" fill="url(#shimmerGrad)"/>
  <rect x="12" y="116" width="116" height="18" rx="4" fill="url(#shimmerGrad)" opacity="0.6"/>
  <rect x="12" y="140" width="100" height="18" rx="4" fill="url(#shimmerGrad)" opacity="0.5"/>
  <rect x="12" y="164" width="110" height="18" rx="4" fill="url(#shimmerGrad)" opacity="0.4"/>
  <rect x="12" y="188" width="96" height="18" rx="4" fill="url(#shimmerGrad)" opacity="0.3"/>
  <rect x="12" y="212" width="106" height="18" rx="4" fill="url(#shimmerGrad)" opacity="0.25"/>
  <rect x="12" y="236" width="90" height="18" rx="4" fill="url(#shimmerGrad)" opacity="0.2"/>
  <rect x="8" y="264" width="124" height="1" fill="#1E2733"/>
  <rect x="12" y="276" width="80" height="10" rx="3" fill="url(#shimmerGrad)" opacity="0.3"/>
  <rect x="12" y="296" width="116" height="10" rx="3" fill="url(#shimmerGrad)" opacity="0.25"/>
  <rect x="12" y="312" width="100" height="10" rx="3" fill="url(#shimmerGrad)" opacity="0.2"/>

  <!-- Canvas loading area -->
  <rect x="140" y="80" width="320" height="400" fill="#070A14"/>

  <!-- Spinner / loading indicator centered -->
  <!-- Outer ring -->
  <circle cx="300" cy="280" r="30" fill="none" stroke="#1E2733" stroke-width="3"/>
  <!-- Spinning arc [ANIM] rotate 360deg, 1.2s linear infinite -->
  <path d="M 300 250 A 30 30 0 0 1 330 280" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>
  <!-- Inner pulse dot -->
  <circle cx="300" cy="280" r="5" fill="#22C55E" fill-opacity="0.6"/>

  <!-- Loading text -->
  <text x="300" y="328" font-size="12" fill="#64748B" text-anchor="middle">Loading graph…</text>
  <text x="300" y="346" font-size="10" fill="#475569" text-anchor="middle">acme-platform · Auth &amp; Identity</text>

  <!-- Shimmer skeleton dots scattered (hint of what's coming) -->
  <circle cx="180" cy="160" r="5" fill="#1E2733" opacity="0.5"/>
  <circle cx="220" cy="140" r="4" fill="#1E2733" opacity="0.4"/>
  <circle cx="260" cy="165" r="6" fill="#1E2733" opacity="0.5"/>
  <circle cx="380" cy="155" r="4" fill="#1E2733" opacity="0.4"/>
  <circle cx="420" cy="170" r="5" fill="#1E2733" opacity="0.45"/>
  <circle cx="160" cy="380" r="4" fill="#1E2733" opacity="0.4"/>
  <circle cx="390" cy="400" r="5" fill="#1E2733" opacity="0.45"/>
  <circle cx="430" cy="360" r="4" fill="#1E2733" opacity="0.4"/>

  <!-- [ANIM] shimmer: opacity 0.4→0.7→0.4, 1.5s ease-in-out loop, prefers-reduced-motion: static gray -->
  <!-- [ANIM] spinner: rotate 360deg, 1.2s linear infinite, prefers-reduced-motion: hide spinner, show static dots -->

  <!-- ============================
       FRAME 2: EMPTY STATE
       ============================ -->
  <rect x="461" y="44" width="459" height="436" fill="#070A14"/>

  <!-- Top nav -->
  <rect x="461" y="44" width="459" height="36" fill="#141920" stroke="#1E2733" stroke-width="1"/>
  <rect x="477" y="54" width="80" height="14" rx="3" fill="#1E2733"/>
  <rect x="571" y="54" width="40" height="14" rx="3" fill="#1E2733"/>
  <rect x="619" y="54" width="40" height="14" rx="3" fill="#1E2733"/>

  <!-- Sidebar (dimmed for empty) -->
  <rect x="461" y="80" width="140" height="400" fill="#0C1118" stroke="#1E2733" stroke-width="1"/>
  <text x="473" y="104" font-size="10" fill="#334155" letter-spacing="0.05em">COMMUNITIES</text>
  <text x="473" y="126" font-size="11" fill="#334155">No groups indexed</text>

  <!-- Empty state centered illustration -->
  <rect x="601" y="80" width="319" height="400" fill="#07091400"/>

  <!-- Empty state illustration: stylized graph nodes with broken links -->
  <!-- Ghost nodes -->
  <circle cx="750" cy="200" r="16" fill="none" stroke="#1E2733" stroke-width="1.5" stroke-dasharray="4,4"/>
  <circle cx="810" cy="240" r="12" fill="none" stroke="#1E2733" stroke-width="1.5" stroke-dasharray="4,4"/>
  <circle cx="700" cy="250" r="10" fill="none" stroke="#1E2733" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="750" y1="200" x2="810" y2="240" stroke="#1E2733" stroke-width="1" stroke-dasharray="3,5" stroke-opacity="0.6"/>
  <line x1="750" y1="200" x2="700" y2="250" stroke="#1E2733" stroke-width="1" stroke-dasharray="3,5" stroke-opacity="0.6"/>
  <!-- Broken link gap indicator -->
  <text x="780" y="215" font-size="14" fill="#334155">⊘</text>

  <!-- Empty state headline -->
  <text x="760" y="308" font-size="16" font-weight="600" fill="#64748B" text-anchor="middle">No graph data yet</text>
  <text x="760" y="328" font-size="12" fill="#475569" text-anchor="middle">Index a repository group to visualize</text>
  <text x="760" y="344" font-size="12" fill="#475569" text-anchor="middle">your codebase architecture</text>

  <!-- CTA button -->
  <rect x="696" y="360" width="128" height="32" rx="6" fill="#172A1F" stroke="#22C55E" stroke-width="1.5"/>
  <text x="760" y="381" font-size="12" fill="#22C55E" text-anchor="middle" font-weight="500">Index a repo group →</text>

  <!-- Learn more link -->
  <text x="760" y="414" font-size="11" fill="#334155" text-anchor="middle">or run </text>
  <text x="795" y="414" font-size="11" fill="#22C55E" class="mono">archigraph index</text>
  <text x="860" y="414" font-size="11" fill="#334155" text-anchor="middle"> in terminal</text>

  <!-- ============================
       FRAME 3: ERROR STATE
       ============================ -->
  <rect x="921" y="44" width="519" height="436" fill="#070A14"/>

  <!-- Top nav -->
  <rect x="921" y="44" width="519" height="36" fill="#141920" stroke="#1E2733" stroke-width="1"/>
  <rect x="937" y="54" width="80" height="14" rx="3" fill="#1E2733"/>
  <rect x="1031" y="54" width="40" height="14" rx="3" fill="#1E2733"/>

  <!-- Sidebar -->
  <rect x="921" y="80" width="140" height="400" fill="#0C1118" stroke="#1E2733" stroke-width="1"/>
  <text x="933" y="104" font-size="10" fill="#334155" letter-spacing="0.05em">COMMUNITIES</text>
  <text x="933" y="126" font-size="11" fill="#334155">Error loading</text>

  <!-- Error card centered -->
  <rect x="1061" y="140" width="359" height="220" fill="#070A14"/>
  <!-- Error card border: red-tinted -->
  <rect x="1090" y="180" width="300" height="148" rx="8" fill="#180A0A" stroke="#EF4444" stroke-width="1.5"/>

  <!-- Error icon -->
  <circle cx="1240" cy="218" r="18" fill="#1E0808" stroke="#EF4444" stroke-width="1.5"/>
  <text x="1240" y="225" font-size="14" fill="#EF4444" text-anchor="middle" font-weight="700">!</text>

  <!-- Error headline -->
  <text x="1240" y="252" font-size="13" font-weight="600" fill="#E2E8F0" text-anchor="middle">Failed to load graph</text>
  <text x="1240" y="270" font-size="11" fill="#94A3B8" text-anchor="middle">Could not reach archigraph server</text>
  <text x="1240" y="286" font-size="11" fill="#94A3B8" text-anchor="middle">at localhost:8080</text>

  <!-- Retry button -->
  <rect x="1176" y="300" width="128" height="28" rx="6" fill="#1E0808" stroke="#EF4444" stroke-width="1.5"/>
  <text x="1240" y="318" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="500">Retry</text>

  <!-- Auto-retry indicator -->
  <text x="1240" y="368" font-size="10" fill="#475569" text-anchor="middle">Auto-retry in 4s · Attempt 2 of 3</text>
  <!-- Progress dots [ANIM] -->
  <circle cx="1216" cy="382" r="3" fill="#EF4444" fill-opacity="0.8"/>
  <circle cx="1230" cy="382" r="3" fill="#EF4444" fill-opacity="0.5"/>
  <circle cx="1244" cy="382" r="3" fill="#475569"/>
  <circle cx="1258" cy="382" r="3" fill="#475569"/>

  <!-- Server status hint -->
  <text x="1240" y="420" font-size="10" fill="#475569" text-anchor="middle">Check that archigraph is running:</text>
  <rect x="1140" y="428" width="200" height="20" rx="4" fill="#080D14"/>
  <text x="1240" y="442" font-size="10" fill="#22C55E" text-anchor="middle" class="mono">archigraph serve --port 8080</text>

  <!-- ============================
       FRAME 4: 2D FALLBACK MODE
       ============================ -->
  <rect x="0" y="481" width="1440" height="479" fill="#07091499"/>

  <!-- Top nav strip -->
  <rect x="0" y="481" width="1440" height="36" fill="#141920" stroke="#1E2733" stroke-width="1"/>
  <rect x="16" y="491" width="8" height="8" rx="2" fill="#22C55E"/>
  <rect x="28" y="491" width="8" height="8" rx="2" fill="#3B82F6"/>
  <text x="44" y="504" font-size="13" font-weight="600" fill="#E2E8F0" letter-spacing="-0.3px">archigraph</text>
  <rect x="120" y="483" width="56" height="30" rx="4" fill="#1E2733"/>
  <text x="148" y="502" font-size="12" font-weight="500" fill="#22C55E" text-anchor="middle">Graph</text>
  <text x="193" y="502" font-size="12" fill="#64748B">Flows</text>
  <text x="242" y="502" font-size="12" fill="#64748B">Topology</text>

  <!-- 2D mode indicator badge -->
  <rect x="660" y="487" width="100" height="24" rx="12" fill="#1B1000" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="710" y="504" font-size="10" fill="#F59E0B" text-anchor="middle" font-weight="600">2D FALLBACK</text>

  <!-- prefers-reduced-motion note -->
  <rect x="772" y="488" width="220" height="22" rx="4" fill="#0E1520" stroke="#1E2733" stroke-width="1"/>
  <text x="882" y="503" font-size="9" fill="#64748B" text-anchor="middle">prefers-reduced-motion: reduce detected</text>

