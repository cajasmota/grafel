  <rect x="1032" y="487" width="30" height="24" rx="6" fill="#1B1000" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="1047" y="503" font-size="10" fill="#F59E0B" text-anchor="middle">2D</text>

  <!-- Sidebar -->
  <rect x="0" y="517" width="220" height="443" fill="#0C1118" stroke="#1E2733" stroke-width="1"/>
  <text x="16" y="549" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.05em">COMMUNITIES</text>
  <rect x="8" y="558" width="204" height="24" rx="4" fill="#1A2333"/>
  <circle cx="24" cy="570" r="5" fill="#06B6D4"/>
  <text x="36" y="575" font-size="12" font-weight="500" fill="#CBD5E1">Auth &amp; Identity</text>
  <rect x="8" y="586" width="204" height="24" rx="4" fill="transparent"/>
  <circle cx="24" cy="598" r="5" fill="#22C55E"/>
  <text x="36" y="603" font-size="12" fill="#94A3B8">Core Services</text>
  <rect x="8" y="614" width="204" height="24" rx="4" fill="transparent"/>
  <circle cx="24" cy="626" r="5" fill="#A855F7"/>
  <text x="36" y="631" font-size="12" fill="#64748B">Data Layer</text>
  <rect x="8" y="642" width="204" height="24" rx="4" fill="transparent"/>
  <circle cx="24" cy="654" r="5" fill="#F59E0B"/>
  <text x="36" y="659" font-size="12" fill="#64748B">API Gateway</text>
  <rect x="16" y="674" width="188" height="1" fill="#1E2733"/>
  <text x="16" y="694" font-size="11" font-weight="600" fill="#64748B" letter-spacing="0.05em">2D LAYOUT</text>
  <text x="16" y="714" font-size="10" fill="#475569">No WebGL animation</text>
  <text x="16" y="730" font-size="10" fill="#475569">SVG force-simulation</text>
  <text x="16" y="746" font-size="10" fill="#475569">via d3-force only</text>

  <!-- 2D Canvas area -->
  <rect x="220" y="517" width="1220" height="443" fill="#07091499"/>

  <!-- 2D GRAPH: flat SVG representation of graph -->
  <!-- Community boundary rings drawn as SVG circles (flat, no 3D depth) -->
  <!-- Auth community -->
  <circle cx="650" cy="700" r="140" fill="#06B6D4" fill-opacity="0.03" stroke="#06B6D4" stroke-width="1" stroke-dasharray="6,8"/>
  <!-- Core community -->
  <circle cx="880" cy="660" r="160" fill="#22C55E" fill-opacity="0.03" stroke="#22C55E" stroke-width="1" stroke-dasharray="6,8"/>
  <!-- Data Layer -->
  <circle cx="1160" cy="720" r="120" fill="#A855F7" fill-opacity="0.03" stroke="#A855F7" stroke-width="1" stroke-dasharray="6,8"/>

  <!-- Community edges (flat straight lines) -->
  <line x1="650" y1="700" x2="880" y2="660" stroke="#22C55E" stroke-width="2" stroke-opacity="0.2"/>
  <line x1="880" y1="660" x2="1160" y2="720" stroke="#A855F7" stroke-width="2" stroke-opacity="0.18"/>
  <line x1="650" y1="700" x2="1160" y2="720" stroke="#06B6D4" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- Entity nodes in 2D: small colored dots with labels -->
  <!-- Auth cluster -->
  <circle cx="580" cy="650" r="7" fill="#06B6D4" fill-opacity="0.7"/>
  <text x="580" y="668" font-size="8" fill="#64748B" text-anchor="middle">UserPermission</text>
  <circle cx="640" cy="620" r="6" fill="#06B6D4" fill-opacity="0.5"/>
  <text x="640" y="638" font-size="8" fill="#475569" text-anchor="middle">AuthViewSet</text>
  <circle cx="700" cy="640" r="5" fill="#06B6D4" fill-opacity="0.4"/>
  <circle cx="620" cy="700" r="5" fill="#06B6D4" fill-opacity="0.4"/>
  <circle cx="680" cy="740" r="6" fill="#06B6D4" fill-opacity="0.5"/>
  <circle cx="600" cy="760" r="4" fill="#06B6D4" fill-opacity="0.3"/>
  <circle cx="650" cy="780" r="5" fill="#06B6D4" fill-opacity="0.35"/>
  <!-- god-node in 2D: slightly larger, amber stroke -->
  <circle cx="700" cy="590" r="10" fill="#06B6D4" fill-opacity="0.3" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="700" y="608" font-size="9" fill="#F59E0B" text-anchor="middle">★ SessionStore</text>

  <!-- Core cluster -->
  <circle cx="830" cy="600" r="12" fill="#22C55E" fill-opacity="0.3" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="830" y="619" font-size="9" fill="#F59E0B" text-anchor="middle">★ UserService</text>
  <circle cx="900" cy="580" r="7" fill="#22C55E" fill-opacity="0.5"/>
  <text x="900" y="598" font-size="8" fill="#64748B" text-anchor="middle">EventBus</text>
  <circle cx="960" cy="620" r="6" fill="#22C55E" fill-opacity="0.45"/>
  <circle cx="840" cy="700" r="6" fill="#22C55E" fill-opacity="0.4"/>
  <circle cx="910" cy="720" r="5" fill="#22C55E" fill-opacity="0.35"/>
  <circle cx="960" cy="680" r="5" fill="#22C55E" fill-opacity="0.35"/>
  <circle cx="800" cy="640" r="4" fill="#22C55E" fill-opacity="0.3"/>

  <!-- Data cluster -->
  <circle cx="1120" cy="670" r="9" fill="#A855F7" fill-opacity="0.5" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="1120" y="688" font-size="9" fill="#F59E0B" text-anchor="middle">★ DatabasePool</text>
  <circle cx="1190" cy="700" r="6" fill="#A855F7" fill-opacity="0.45"/>
  <circle cx="1160" cy="760" r="5" fill="#A855F7" fill-opacity="0.4"/>
  <circle cx="1220" cy="750" r="4" fill="#A855F7" fill-opacity="0.35"/>

  <!-- Edge lines between nodes (flat) -->
  <line x1="580" y1="650" x2="640" y2="620" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="640" y1="620" x2="700" y2="590" stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="700" y1="590" x2="830" y2="600" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="830" y1="600" x2="900" y2="580" stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="900" y1="580" x2="1120" y2="670" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.45"/>
  <line x1="700" y1="590" x2="620" y2="700" stroke="#10B981" stroke-width="1" stroke-opacity="0.3"/>

  <!-- 2D annotation callout -->
  <rect x="1260" y="530" width="170" height="66" rx="6" fill="#0E1520" stroke="#1E2733" stroke-width="1"/>
  <text x="1276" y="550" font-size="10" font-weight="600" fill="#94A3B8">2D Fallback</text>
  <text x="1276" y="566" font-size="9" fill="#64748B">d3-force simulation</text>
  <text x="1276" y="580" font-size="9" fill="#64748B">No WebGL / three.js</text>
  <text x="1276" y="594" font-size="9" fill="#F59E0B">★ = god-nodes (amber ring)</text>

  <!-- [ANIM] 2D: no CSS animation; d3-force tick updates SVG positions; no shimmer -->
  <!-- [ANIM] prefers-reduced-motion triggers 2D mode automatically -->
</svg>
