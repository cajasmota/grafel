name: language-release-calendar
# A3 proactive freshness nudge (epic #5359, milestone 0.1.4). Monthly cron + manual.
# Fires AHEAD of known language-release windows and opens/updates a SINGLE
# reminder issue pointing at docs/language-release-calendar.md, so we verify that
# the bundled grammar + the extractors handle version N around the day it lands.
# This is the proactive complement to A2 (grammar-freshness.yml, the per-grammar
# alarm) and A4 (the parse-error canary). See docs/language-release-calendar.md.
#
# Cron + manual only (NOT push/PR) to stay inside free-tier minutes per CI policy.
on:
  schedule:
    # 06:00 UTC on the 1st of every month.
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: language-release-calendar
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_TITLE: 'Language-release watch: verify grammar + extractors for upcoming versions'
      ISSUE_LABEL: grammar-release-watch
      CALENDAR: docs/language-release-calendar.md
    steps:
      - uses: actions/checkout@v4

      - name: Compute upcoming release windows (next ~8 weeks)
        id: windows
        shell: bash
        run: |
          set -euo pipefail
          # Predictable-cadence languages keyed by release month (1-12).
          # Languages with irregular cadences are intentionally omitted — the A2
          # cron and A4 canary cover those. Format: "month|Language|window".
          windows=(
            "3|Java|March feature/LTS release"
            "9|Java|September .0 release"
            "11|C#/.NET|November GA (.NET ships)"
            "10|Python|October annual release"
            "2|Go|February minor release"
            "8|Go|August minor release"
            "9|Swift|~September (WWDC-aligned) GA"
            "11|PHP|November annual release"
            "12|Ruby|December (25th) annual release"
          )

          this_month=$(date -u +%-m)
          next_month=$(date -u -d '+1 month' +%-m 2>/dev/null || date -u -v+1m +%-m)

          {
            echo "## Upcoming language-release windows"
            echo
            echo "_Generated by \`.github/workflows/language-release-calendar.yml\` on $(date -u +%Y-%m-%d). Reference: [\`$CALENDAR\`]($CALENDAR)._"
            echo
            hit=0
            for w in "${windows[@]}"; do
              m="${w%%|*}"; rest="${w#*|}"
              lang="${rest%%|*}"; window="${rest#*|}"
              if [ "$m" = "$this_month" ] || [ "$m" = "$next_month" ]; then
                echo "- **$lang** — $window. On release N, run the per-release checklist in the calendar: (1) does the new syntax parse (A4 canary / A2 cron)? (2) do extractors model the new constructs (C1 triage #5415)?"
                hit=1
              fi
            done
            if [ "$hit" = "0" ]; then
              echo "_No predictable-cadence release windows in the next ~8 weeks. The A2 monthly cron (#5411) and A4 parse-error canary (#5414) remain the safety net for irregular-cadence languages._"
            fi
            echo
            echo "---"
            echo "Proactive freshness nudge from **A3** (epic #5359). See the full cadence table and checklist in [\`$CALENDAR\`]($CALENDAR)."
          } > issue-body.md

          cat issue-body.md

      - name: Ensure the reminder label exists
        run: |
          gh label create "$ISSUE_LABEL" \
            --description "proactive language-release verification reminder (A3, #5359)" \
            --color FEF2C0 2>/dev/null || true

      - name: Create or update the single reminder issue (idempotent)
        run: |
          set -euo pipefail
          # Find an existing OPEN issue by the stable label; fall back to title.
          existing=$(gh issue list --state open --label "$ISSUE_LABEL" \
                       --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$existing" ]; then
            existing=$(gh issue list --state open --search "in:title \"$ISSUE_TITLE\"" \
                         --json number --jq '.[0].number' 2>/dev/null || true)
          fi

          if [ -n "$existing" ]; then
            echo "Updating existing reminder issue #$existing"
            gh issue edit "$existing" --body-file issue-body.md
            gh issue edit "$existing" --add-label "$ISSUE_LABEL" || true
          else
            echo "Creating reminder issue"
            gh issue create --title "$ISSUE_TITLE" \
              --label "$ISSUE_LABEL" \
              --body-file issue-body.md
          fi
