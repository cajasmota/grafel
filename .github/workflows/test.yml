name: test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    # Windows is allowed to fail until tree-sitter CGO bindings are confirmed
    # on windows-latest — tracked in #937. Remove continue-on-error once #937
    # and its prerequisites (#926, #928) are resolved.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - run: go mod download

      - run: go vet ./...

      # gofmt check — only enforce on Linux to avoid CRLF noise from Windows
      # tooling. macOS and Linux share the same line endings in the repo so
      # running on ubuntu-latest is sufficient.
      - name: gofmt
        if: runner.os == 'Linux'
        shell: bash
        run: |
          diff=$(gofmt -l . 2>&1)
          if [ -n "$diff" ]; then
            echo "Files need gofmt:"
            echo "$diff"
            exit 1
          fi

      - run: go build ./...

      # -timeout 5m: one stuck test (e.g. TestBoot_WatcherSubscriptionDoesNotBlockBind
      # under race on a slow CI runner) previously ate the full default 10-minute
      # suite timeout before Go reported the failure. 5m is ample for the suite
      # (~30s on macos-latest with -race) while failing fast on any deadlock.
      # See #1797 / #937 for the root-cause investigation.
      - run: go test -race -count=1 -timeout 5m ./...
